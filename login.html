<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Corporativo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            width: 320px;
        }
        h2 { margin-top: 0; color: #1f2937; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #4b5563; font-weight: 500; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background-color: #1d4ed8; }
        .erro { color: #dc2626; text-align: center; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Painel Admin 🔐</h2>
        
        <!-- Alerta se a senha estiver errada -->
        <div id="mensagem-erro" class="erro" style="display: none;">Usuário ou senha incorretos!</div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" name="usuario" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <script>
        // Verifica se a URL tem o sinal de erro (?erro=1) e mostra o alerta
        if (window.location.search.includes('erro=1')) {
            document.getElementById('mensagem-erro').style.display = 'block';
        }
    </script>
</body>
</html>
